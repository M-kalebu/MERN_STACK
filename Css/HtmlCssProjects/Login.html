<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="Login.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="header"><h2>Member Login</h2></div>
      <div class="row">
        <div class="label"><label for="user">Your username</label></div>
        <input type="email" id="user" placeholder="Email or Phone" />
      </div>
      <div class="row">
        <div class="label"><label for="password">Your password</label></div>
        <input type="text" id="user" placeholder="Password" />
      </div>
      <p class="pass"><a href="#">Forget Password</a></p>
      <div class="row">
        <input class="button" type="submit" value="Login" />
      </div>
    </div>
  </body>
</html>
